name: Build & (optional) Pages deploy (+ Release assets)

on:
  push:
    branches: ["**"]
  pull_request:
  release:
    types: [published]
  workflow_dispatch:

# Needed for Pages + Release asset upload
permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: docs-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build_docs:
    runs-on: ubuntu-latest
    container:
      image: asciidoctor/docker-asciidoctor:1.84
    steps:
      - uses: actions/checkout@v4

      - name: Cache asciidoctor-diagram outputs
        uses: actions/cache@v4
        with:
          path: .asciidoctor/diagram
          key: diagram-${{ hashFiles('doc/**/*.adoc') }}
          restore-keys: diagram-

      - name: Build HTML & PDF
        run: |
          set -euo pipefail
          asciidoctor \
            -a data-uri -a toc=left -a sectnums -a reproducible -a icons=font \
            -a source-highlighter=Pygments -a experimental \
            -r asciidoctor-diagram \
            -a imagesdir=images -a imagesoutdir=.asciidoctor/diagram \
            -a diagram-cachedir=.asciidoctor/diagram \
            -D public -R doc "**/*.adoc"

          mkdir -p build/pdf public/pdf
          asciidoctor-pdf \
            -r asciidoctor-diagram \
            -a imagesdir=images -a imagesoutdir=.asciidoctor/diagram \
            -a diagram-cachedir=.asciidoctor/diagram \
            -D build/pdf -R doc "**/*.adoc" || true
          cp -a build/pdf/*.pdf public/pdf/ || true

      - name: Prepare _site (flatten so index.html is at root)
        run: |
          rm -rf _site
          mkdir -p _site
          cp -a public/. _site/
          mkdir -p _site/pdf
          cp -a build/pdf/*.pdf _site/pdf/ || true

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: site
          path: _site
          if-no-files-found: error

  deploy_pages:
    needs: build_docs
    if: github.event_name == 'push' && github.ref == format('refs/heads/{0}', github.event.repository.default_branch)
    runs-on: ubuntu-latest
    steps:
      - name: Download site artifact
        uses: actions/download-artifact@v4
        with:
          name: site
          path: _site

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy
        id: deploy
        uses: actions/deploy-pages@v4
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}

  upload_release_assets:
    needs: build_docs
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download site artifact
        uses: actions/download-artifact@v4
        with:
          name: site
          path: _site

      - name: Package docs
        run: |
          set -euo pipefail
          # One neat asset that contains HTML + PDFs
          zip -r docs-site.zip _site

      - name: Upload assets to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            docs-site.zip